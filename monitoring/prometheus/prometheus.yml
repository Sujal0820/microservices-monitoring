global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "api-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: "auth-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:8001"]
  
  - job_name: "data-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["data-service:8002"]